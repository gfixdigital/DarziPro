name: darzi_pro
description: A production-grade, offline-first CRM for tailor shops in Pakistan.
publish_to: 'none'
version: 1.0.6+7

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.0.0
  hive_flutter: ^1.1.0
  flutter_localizations:
    sdk: flutter
  hive: ^2.2.3
  provider: ^6.1.1
  connectivity_plus: ^5.0.0
  url_launcher: ^6.2.0
  intl: ^0.20.2
  uuid: ^4.3.3
  google_fonts: ^6.1.0
  http: ^1.2.0
  package_info_plus: ^8.0.0
  path_provider: ^2.1.0
  open_file: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
